<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Speech Coach - History Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f8f9fa; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 600px; text-align: center; position: relative; }
        .step-label { color: #adb5bd; font-weight: 700; text-transform: uppercase; font-size: 11px; margin-bottom: 10px; letter-spacing: 1px; }
        
        .sentence-display { font-size: 32px; line-height: 1.5; margin: 20px 0; font-weight: 600; color: #333; }
        .word { display: inline-block; margin: 0 4px; padding: 0 2px; transition: all 0.2s; border-bottom: 3px solid transparent; }
        
        .correct { color: #2ecc71; border-bottom-color: #2ecc71; }
        .wrong { color: #e74c3c; border-bottom-color: #e74c3c; }

        .status-pill { display: inline-block; padding: 10px 25px; border-radius: 50px; font-size: 14px; background: #eee; margin: 20px 0; font-weight: 600; }
        .listening { background: #ff4757; color: white; }
        .processing { background: #3498db; color: white; }

        .score-display { font-size: 52px; font-weight: 900; color: #228be6; margin: 10px 0; display: none; }
        
        .transcript-container { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px dashed #ddd; border-radius: 12px; display: none; text-align: left; }
        .transcript-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        .transcript-text { color: #444; font-style: italic; font-size: 17px; }

        button { background: #212529; color: white; border: none; padding: 14px 35px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; display: none; margin: 20px auto; }
        kbd { background: #eee; border: 1px solid #ccc; border-radius: 4px; padding: 2px 6px; font-family: monospace; }

        /* HISTORY OVERLAY STYLES */
        #historyOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; 
        }
        .history-content { 
            background: white; width: 90%; max-width: 500px; max-height: 80vh; 
            border-radius: 20px; padding: 30px; overflow-y: auto; text-align: left; 
        }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .history-item:last-child { border: none; }
        .h-score { font-weight: 800; color: #228be6; float: right; }
        .h-sentence { font-weight: 600; display: block; margin-bottom: 4px; }
        .h-transcript { color: #888; font-size: 13px; font-style: italic; }
    </style>
</head>
<body>

<div id="historyOverlay" onclick="toggleHistory()">
    <div class="history-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0">Session History</h2>
        <div id="historyList"></div>
        <button onclick="toggleHistory()" style="display:block; margin-top:20px; width:100%">Close</button>
    </div>
</div>

<div class="container">
    <div id="stepLabel" class="step-label">Loading Sentences...</div>
    <div id="textContainer" class="sentence-display"></div>
    
    <div id="status" class="status-pill">Press Space to Record</div>
    <div id="score" class="score-display">0%</div>

    <div id="transcriptBox" class="transcript-container">
        <div class="transcript-label">Strict Transcription:</div>
        <div id="transcriptText" class="transcript-text"></div>
    </div>

    <button id="nextBtn" onclick="nextSentence()">Next Sentence →</button>

    <div style="margin-top: 30px; color: #adb5bd; font-size: 12px;">
        <kbd>Space</kbd> Start/Stop &nbsp; | &nbsp; <kbd>L</kbd> Model &nbsp; | &nbsp; <kbd>H</kbd> History
    </div>
</div>

<script>
    let sentences = [];
    let historyData = [];
    let currentStep = 0;
    let isListening = false;
    let recognition;
    let watchdog;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
    }

    async function loadData() {
        try {
            const resp = await fetch('sentences.json');
            sentences = await resp.json();
            renderSentence();
        } catch (e) { document.getElementById('stepLabel').innerText = "JSON Error"; }
    }

    function renderSentence() {
        const words = sentences[currentStep].split(/\s+/);
        document.getElementById('textContainer').innerHTML = words.map((w, i) => `<span class="word" id="word-${i}">${w}</span>`).join("");
        document.getElementById('stepLabel').innerText = `Sentence ${currentStep + 1} of ${sentences.length}`;
        document.getElementById('score').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('transcriptBox').style.display = "none";
        resetUI("Press Space to Record");
    }

    function resetUI(msg) {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.className = "status-pill";
        isListening = false;
        clearTimeout(watchdog);
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === "Space") {
            e.preventDefault();
            if (!isListening) {
                recognition.abort();
                recognition.start();
                isListening = true;
                document.getElementById('status').innerText = "🔴 RECORDING...";
                document.getElementById('status').className = "status-pill listening";
                document.getElementById('score').style.display = "none";
                document.getElementById('transcriptBox').style.display = "none";
            } else {
                stopAndAnalyze();
            }
        }
        if (e.key.toLowerCase() === "l") playExample();
        if (e.key.toLowerCase() === "h") toggleHistory();
    });

    function toggleHistory() {
        const overlay = document.getElementById('historyOverlay');
        if (overlay.style.display === "flex") {
            overlay.style.display = "none";
        } else {
            renderHistory();
            overlay.style.display = "flex";
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (historyData.length === 0) {
            list.innerHTML = "<p style='color:#bbb'>No scores yet. Complete an exercise first!</p>";
            return;
        }
        list.innerHTML = historyData.map(item => `
            <div class="history-item">
                <span class="h-score">${item.score}%</span>
                <span class="h-sentence">${item.sentence}</span>
                <span class="h-transcript">Heard: "${item.heard}"</span>
            </div>
        `).join("");
    }

    function stopAndAnalyze() {
        recognition.stop();
        isListening = false;
        document.getElementById('status').innerText = "⏳ Comparing...";
        document.getElementById('status').className = "status-pill processing";
        watchdog = setTimeout(() => {
            if (document.getElementById('status').innerText === "⏳ Comparing...") {
                recognition.abort();
                resetUI("⚠️ Timed out.");
            }
        }, 1200);
    }

    recognition.onresult = (event) => {
        clearTimeout(watchdog);
        const rawTranscript = event.results[0][0].transcript;
        const transcriptClean = rawTranscript.toLowerCase().replace(/[?.!]/g,"").trim();
        const targetClean = sentences[currentStep].toLowerCase().replace(/[?.!]/g,"").trim();
        
        const targetWords = targetClean.split(/\s+/);
        const transcriptWords = transcriptClean.split(/\s+/);

        targetWords.forEach((tWord, i) => {
            const el = document.getElementById(`word-${i}`);
            if (transcriptWords.includes(tWord)) el.className = "word correct";
            else el.className = "word wrong";
        });

        let score = calculateCharacterScore(targetClean, transcriptClean);
        if (targetWords.length !== transcriptWords.length) score -= 30;
        score = Math.max(0, Math.round(score));
        
        // Add to history
        historyData.unshift({
            sentence: sentences[currentStep],
            score: score,
            heard: rawTranscript
        });

        document.getElementById('score').innerText = score + "%";
        document.getElementById('score').style.display = "block";
        document.getElementById('transcriptText').innerText = `"${rawTranscript}"`;
        document.getElementById('transcriptBox').style.display = "block";
        document.getElementById('nextBtn').style.display = "block";
        resetUI("Done!");
    };

    function calculateCharacterScore(target, spoken) {
        if (target === spoken) return 100;
        const dist = getLevenshteinDistance(target, spoken);
        const maxLen = Math.max(target.length, spoken.length);
        return ((maxLen - dist) / maxLen) * 100;
    }

    function getLevenshteinDistance(s1, s2) {
        const track = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
        for (let i = 0; i <= s1.length; i++) track[0][i] = i;
        for (let j = 0; j <= s2.length; j++) track[j][0] = j;
        for (let j = 1; j <= s2.length; j++) {
            for (let i = 1; i <= s1.length; i++) {
                const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1;
                track[j][i] = Math.min(track[j][i - 1] + 1, track[j - 1][i] + 1, track[j - 1][i - 1] + indicator);
            }
        }
        return track[s2.length][s1.length];
    }

    recognition.onerror = () => resetUI("🔇 Mic Error");

    function playExample() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(sentences[currentStep]);
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    function nextSentence() {
        currentStep = (currentStep + 1) % sentences.length;
        renderSentence();
    }

    loadData();
</script>
</body>
</html>
