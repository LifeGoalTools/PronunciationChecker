<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Practice - Fast Response</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        .step-indicator { color: #888; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .target-sentence { font-size: 28px; color: #2c3e50; margin-bottom: 30px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .status-pill { display: inline-block; padding: 10px 25px; border-radius: 50px; font-size: 14px; margin-bottom: 20px; background: #eee; transition: all 0.2s; border: 2px solid transparent; }
        .listening { background: #ffeaea; color: #ff4757; border-color: #ff4757; font-weight: bold; }
        .processing { background: #e3f2fd; color: #2196f3; }
        .controls { margin-top: 20px; }
        .hint { font-size: 13px; color: #999; margin-top: 20px; padding: 10px; border-top: 1px solid #eee; }
        .score-box { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; background: #f8f9fa; border: 1px solid #e9ecef; }
        .big-score { font-size: 52px; font-weight: bold; color: #2ed573; margin-bottom: 10px; }
        button { background: #2f3542; color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: 600; transition: transform 0.1s; }
        button:hover { background: #1e222b; }
        button:active { transform: scale(0.95); }
        kbd { background: #eee; border-radius: 3px; border: 1px solid #ccc; padding: 1px 6px; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="container">
    <div id="stepLabel" class="step-indicator">Sentence 1 of 3</div>
    <div id="targetDisplay" class="target-sentence">What day is it?</div>
    
    <div id="status" class="status-pill">Press Space to Start</div>

    <div id="results" class="score-box">
        <div id="scoreDisplay" class="big-score">0%</div>
        <p>I heard: <i id="heardText" style="color: #555;">...</i></p>
        <button onclick="nextSentence()" id="nextBtn">Next Sentence</button>
    </div>

    <div class="hint">
        Use <kbd>Space Bar</kbd> to toggle microphone.
    </div>
</div>

<script>
    const sentences = ["What day is it?", "What is the date today?", "How's the weather?"];
    let currentStep = 0;
    let isListening = false;
    let processingTimeout;

    const targetDisplay = document.getElementById('targetDisplay');
    const stepLabel = document.getElementById('stepLabel');
    const statusPill = document.getElementById('status');
    const resultsBox = document.getElementById('results');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const heardText = document.getElementById('heardText');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    // SPACE BAR HANDLER
    window.addEventListener('keydown', (e) => {
        if (e.code === "Space") {
            e.preventDefault(); 
            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        }
    });

    function startListening() {
        try {
            resultsBox.style.display = "none";
            recognition.start();
        } catch (e) {
            console.log("Recognition already active.");
        }
    }

    recognition.onstart = () => {
        isListening = true;
        statusPill.textContent = "🔴 Listening... (Press Space to Stop)";
        statusPill.className = "status-pill listening";
    };

    function stopListening() {
        recognition.stop();
        statusPill.textContent = "⏳ Processing...";
        statusPill.className = "status-pill processing";
        
        // Safety timeout: if server doesn't respond in 4s, reset
        clearTimeout(processingTimeout);
        processingTimeout = setTimeout(() => {
            if (statusPill.textContent === "⏳ Processing...") {
                statusPill.textContent = "⚠️ Server timed out. Try again.";
                statusPill.className = "status-pill";
                isListening = false;
            }
        }, 4000);
    }

    recognition.onresult = (event) => {
        clearTimeout(processingTimeout);
        const transcript = event.results[0][0].transcript;
        const target = sentences[currentStep];
        const score = calculateSimilarity(target.toLowerCase(), transcript.toLowerCase());
        
        showResults(transcript, score);
    };

    recognition.onend = () => {
        isListening = false;
        if (statusPill.className.includes("listening")) {
            statusPill.textContent = "Press Space to Start";
            statusPill.className = "status-pill";
        }
    };

    recognition.onerror = (event) => {
        clearTimeout(processingTimeout);
        statusPill.textContent = "Error: " + event.error;
        statusPill.className = "status-pill";
        isListening = false;
    };

    function showResults(heard, score) {
        resultsBox.style.display = "block";
        scoreDisplay.textContent = Math.round(score * 100) + "%";
        heardText.textContent = `"${heard}"`;
        statusPill.textContent = "Done! Press Space to try again";
        statusPill.className = "status-pill";
        
        if (score > 0.8) scoreDisplay.style.color = "#2ed573";
        else if (score > 0.5) scoreDisplay.style.color = "#ffa502";
        else scoreDisplay.style.color = "#ff4757";

        if(currentStep === sentences.length - 1) {
            document.getElementById('nextBtn').textContent = "Restart Practice";
        }
    }

    function nextSentence() {
        currentStep++;
        if (currentStep >= sentences.length) {
            currentStep = 0;
            document.getElementById('nextBtn').textContent = "Next Sentence";
        }
        updateUI();
    }

    function updateUI() {
        targetDisplay.textContent = sentences[currentStep];
        stepLabel.textContent = `Sentence ${currentStep + 1} of ${sentences.length}`;
        resultsBox.style.display = "none";
        statusPill.textContent = "Press Space to Start";
    }

    function calculateSimilarity(s1, s2) {
        s1 = s1.replace(/[?.!,]/g,"").trim();
        s2 = s2.replace(/[?.!,]/g,"").trim();
        let longer = s1.length > s2.length ? s1 : s2;
        let shorter = s1.length > s2.length ? s2 : s1;
        if (longer.length === 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function editDistance(s1, s2) {
        const costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i === 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
</script>

</body>
</html>
